# FoodHub Multi-Container Application Stack
version: '3.8'

services:
  # Load Balancer & Proxy
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # Laravel Application (PHP 8.2 FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-foodhub}
      - DB_USERNAME=${DB_USERNAME:-sail}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis

  # Background Queue Worker
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --tries=3
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - app
      - redis

  # MySQL Datastore
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_DATABASE: '${DB_DATABASE:-foodhub}'
      MYSQL_USER: '${DB_USERNAME:-sail}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - foodhub-mysql-data:/var/lib/mysql

  # Redis Cache & Queue Broker
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - foodhub-redis-data:/data

  # Admin Dashboard (Vite Frontend) Node container
  admin-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  foodhub-mysql-data:
  foodhub-redis-data:
